worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr notice;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        ping 30s;
        ping_timeout 10s;

        application live {
            live on;
            record off;
            idle_streams off;
            push_reconnect 1s;

            include /etc/nginx/generated/push.conf;
        }
    }
}

http {
    access_log off;
    server_tokens off;

    server {
        listen 127.0.0.1:8081;
        server_name localhost;

        location = /stat {
            rtmp_stat all;
        }

        location / {
            return 404;
        }
    }
}

